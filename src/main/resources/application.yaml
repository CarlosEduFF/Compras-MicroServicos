server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    discovery:
      client:
        simple:
          instances:
            api-produto:
              - uri: http://localhost:8081
              - uri: http://localhost:8082
            api-login:
              - uri: http://localhost:8083
              - uri: http://localhost:8084
            api-cliente:
              - uri: http://localhost:8085
              - uri: http://localhost:8086

    gateway:
      routes:
        - id: api-produto
          uri: lb://api-produto
          predicates:
            - Path=/produto/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE, NOT_FOUND
                methods: GET, POST
                backoff:
                  firstBackoff: 10ms
                  maxBackoff: 50ms
                  factor: 2
                  basedOnPreviousValue: true

        - id: api-login
          uri: lb://api-login
          predicates:
            - Path=/login/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE, NOT_FOUND
                methods: GET, POST
                backoff:
                  firstBackoff: 10ms
                  maxBackoff: 50ms
                  factor: 2
                  basedOnPreviousValue: true

        - id: api-cliente
          uri: lb://api-cliente
          predicates:
            - Path=/cliente/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE, NOT_FOUND
                methods: GET, POST
                backoff:
                  firstBackoff: 10ms
                  maxBackoff: 50ms
                  factor: 2
                  basedOnPreviousValue: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG